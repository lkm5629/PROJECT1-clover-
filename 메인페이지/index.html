<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>클로버 - 프리미엄 학습 공간</title>
    <link rel="stylesheet" href="./css/메인페이지.css">
    <link rel="stylesheet" href="./css/common.css">
</head>
<body>

    <header id="header-include" class="hdr"></header>

    <main>
        <section class="hero flex-center">
            </section>
    </main>

    <footer id="footer-include" class="ftr"></footer>

    <script>
        async function loadHTML(id, path) {
            const response = await fetch(path); // 파일 가져오기 요청
            const text = await response.text(); // 텍스트로 변환
            document.getElementById(id).innerHTML = text; // 지정한 자리에 넣기
        }

        // 실제 실행 (파일 경로를 정확히 적어주세요)
        loadHTML('header-include', './inc/header.html');
        loadHTML('footer-include', './inc/footer.html');
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>

    <link rel="stylesheet" href="./TODO.css" />
    <link rel="stylesheet" href="./common.css">
    <script src="./TODO.js"></script>
</head>

<body>
<header id="header-include" class="hdr"></header>
    <div class="wrap">
        <!-- 좌측 메뉴 -->
        <aside class="side-menu">
            <div class="logo-box">로고</div>

            <button type="button" id="menuDb" class="menu-btn active">일정DB</button>
            <button type="button" id="menuCalendar" class="menu-btn">캘린더</button>
            <button type="button" id="menuWeekly" class="menu-btn">위클리</button>
        </aside>

        <!-- 메인 -->
        <main class="main-content">

            <!-- ===================== -->
            <!-- 1) 일정DB -->
            <!-- ===================== -->
            <section id="pageDb" class="page active">

                <div class="page-top">
                    <div>
                        <!-- <p class="page-sub-text">Escoredream / TODO / DB 화면</p> -->
                        <div class="page-title">일정 DB</div>
                    </div>

                    <div class="db-top-right">
                        <button type="button" id="openAddBoxBtn" class="main-btn">할 일 추가</button>

                        <div class="menu-area">
                            <button type="button" id="selectedMenuBtn" class="line-btn">선택 메뉴</button>

                            <div id="selectedMenuList" class="drop-menu">
                                <button type="button" id="selectAllBtn">전체 선택</button>
                                <button type="button" id="unselectAllBtn">선택 해제</button>
                                <button type="button" id="deleteSelectedBtn">선택 삭제</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 입력창 -->
                <div id="addFormBox" class="add-form-box hide">
                    <div class="form-row">
                        <label class="form-label">날짜</label>
                        <div class="date-input-row">
                            <input type="text" id="dbYear" class="fix-input date-part" maxlength="4"
                                placeholder="년(4자리)" inputmode="numeric">
                            <span class="date-mark">-</span>
                            <input type="text" id="dbMonth" class="fix-input date-part small-part" maxlength="2"
                                placeholder="월" inputmode="numeric">
                            <span class="date-mark">-</span>
                            <input type="text" id="dbDay" class="fix-input date-part small-part" maxlength="2"
                                placeholder="일" inputmode="numeric">
                        </div>
                    </div>

                    <div class="form-row">
                        <label class="form-label" for="dbTimeText">시간 (HHMM 또는 HH:MM)</label>
                        <input type="text" id="dbTimeText" class="fix-input" maxlength="5"
                            placeholder="예: 1300 또는 13:00" inputmode="numeric">
                        <div id="timePreview" class="mini-help">예: 1300 입력 → 자동으로 13:00 / 오후 1:00</div>
                    </div>

                    <div class="form-row">
                        <label class="form-label" for="dbTitle">제목</label>
                        <input type="text" id="dbTitle" class="fix-input" placeholder="일정 제목 입력">
                    </div>

                    <div class="form-row">
                        <label class="form-label" for="dbCategory">구분</label>
                        <input type="text" id="dbCategory" class="fix-input" placeholder="예: 개인 / 회의 / 공지">
                    </div>

                    <div class="form-row">
                        <label class="form-label" for="dbDetail">상세내용</label>
                        <input type="text" id="dbDetail" class="fix-input" placeholder="상세내용 입력">
                    </div>

                    <div class="form-row">
                        <label class="form-label">파일 첨부</label>
                        <input type="file" id="dbFileInput" class="file-input-hidden">
                        <div id="fileDropBox" class="file-drop-box">
                            <div class="file-drop-main-text">파일을 끌어놓거나 클릭해서 선택</div>
                            <div id="selectedFileName" class="selected-file-name">첨부없음</div>
                        </div>
                    </div>

                    <div class="form-btn-row">
                        <button type="button" id="saveTodoBtn" class="main-btn">저장</button>
                        <button type="button" id="cancelTodoBtn" class="line-btn">취소</button>
                    </div>
                </div>

                <!-- 표 -->
                <div class="table-box">
                    <table class="todo-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="checkAll"></th>
                                <th>날짜</th>
                                <th>시간</th>
                                <th>제목</th>
                                <th>상태</th>
                                <th>구분</th>
                                <th>상세내용</th>
                                <th>파일</th>
                                <th>삭제</th>
                            </tr>
                        </thead>
                        <tbody id="todoTableBody"></tbody>
                    </table>
                </div>
            </section>

            <!-- ===================== -->
            <!-- 2) 캘린더 -->
            <!-- ===================== -->
            <section id="pageCalendar" class="page">

                <div class="page-top">
                    <div>
                        <!-- <p class="page-sub-text">월간 일정 확인 화면</p> -->
                        <div class="page-title">캘린더</div>
                    </div>

                    <div class="calendar-move-box">
                        <button type="button" id="prevMonthBtn" class="line-btn">이전달</button>
                        <div id="calendarTitle" class="date-title">2025년 6월</div>
                        <button type="button" id="nextMonthBtn" class="line-btn">다음달</button>
                    </div>
                </div>

                <div class="calendar-box">
                    <table class="calendar-table">
                        <thead>
                            <tr>
                                <th class="sun-text">일</th>
                                <th>월</th>
                                <th>화</th>
                                <th>수</th>
                                <th>목</th>
                                <th>금</th>
                                <th class="sat-text">토</th>
                            </tr>
                        </thead>
                        <tbody id="calendarBody"></tbody>
                    </table>
                </div>

            </section>

            <!-- ===================== -->
            <!-- 3) 위클리 -->
            <!-- ===================== -->
            <section id="pageWeekly" class="page">

                <div class="page-top">
                    <div>
                        <!-- <p class="page-sub-text">주간 시간표 화면</p> -->
                        <div class="page-title">위클리</div>
                    </div>

                    <div class="weekly-top-right">
                        <button type="button" id="weeklyAddBtn" class="main-btn">+ 추가</button>
                        <button type="button" id="prevWeekBtn" class="line-btn">이전 주</button>
                        <div id="weeklyTitle" class="date-title">6월 첫째주</div>
                        <button type="button" id="nextWeekBtn" class="line-btn">다음 주</button>
                    </div>
                </div>

                <div id="weeklyAddPanel" class="weekly-add-panel hide">
                    <div class="weekly-panel-top">
                        <div class="weekly-panel-title">일정DB에서 가져오기</div>
                        <button type="button" id="weeklyCloseBtn" class="line-btn small-btn">닫기</button>
                    </div>

                    <div class="weekly-guide-text">
                        먼저 시간표 칸을 클릭하고, 몇 시간 동안 진행할지 고른 뒤 일정을 선택해줘.
                    </div>

                    <div class="weekly-duration-row">
                        <label for="weeklyDuration" class="duration-label">진행 시간</label>
                        <select id="weeklyDuration" class="duration-select">
                            <option value="1">1시간</option>
                            <option value="2">2시간</option>
                            <option value="3">3시간</option>
                            <option value="4">4시간</option>
                            <option value="5">5시간</option>
                            <option value="6">6시간</option>
                        </select>

                        <button type="button" id="weeklyEditBtn" class="line-btn small-btn">수정</button>
                        <button type="button" id="weeklyDeleteBtn" class="line-btn small-btn">삭제</button>
                    </div>
                    <div id="weeklySelectList" class="weekly-select-list"></div>
                </div>

                <div class="weekly-box">
                    <table class="weekly-table">
                        <thead>
                            <tr>
                                <th class="time-col">시간</th>
                                <th class="sun-text">일</th>
                                <th>월</th>
                                <th>화</th>
                                <th>수</th>
                                <th>목</th>
                                <th>금</th>
                                <th class="sat-text">토</th>
                            </tr>
                        </thead>
                        <tbody id="weeklyBody"></tbody>
                    </table>
                </div>

            </section>

        </main>
    </div>
<footer id="footer-include" class="ftr"></footer>
<script src="./common.js"></script>
</body>

</html>

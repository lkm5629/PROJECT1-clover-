        .write-wrap {

        .form-box {

            padding: 22px;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
            background: #fff;
        }

        .row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 14px;
        }

        label {
            font-size: 13px;
            font-weight: 900;
            color: #111;
        }

        input,
        textarea {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 12px;
            font-size: 14px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #FBCB4C;
            box-shadow: 0 0 0 4px rgba(251, 203, 76, 0.22);
        }

        textarea {
            min-height: 220px;
            resize: vertical;
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            border: 1px solid #d6d6d6;
            background: #fff;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .btn:hover {
            background: #FBCB4C;
            border-color: #FBCB4C;
        }

        .btn-primary {
            background: #FBCB4C;
            border-color: #FBCB4C;
            color: #111;
        }

        .btn-primary:hover {
            filter: brightness(0.98);
        }

        @media (max-width: 1200px) {

            /* 상단바 */

            .nav .gnb {
                width: 100%;

                flex-wrap: wrap;
                /* 줄바꿈 */

                margin: 0;
                padding: 0;
            }

            .nav .gnb a {
                font-size: 13px;
                padding: 6px 8px;
                display: inline-block;
                white-space: nowrap;
            }
        }
    </style>

    <main class="write-wrap">
        <h2 class="write-title">공지 작성</h2>

        <div class="form-box">
            <div class="row">
                <label for="title">제목</label>
                <input id="title" type="text" placeholder="제목을 입력해주세요." />
            </div>

            <div class="row">
                <label for="author">작성자</label>
                <input id="author" type="text" value="관리자" />
            </div>

            <div class="row">
                <label for="content">내용</label>
                <textarea id="content"></textarea>
            </div>

            <div class="actions">
                <button class="btn" id="cancelBtn" type="button">취소</button>
                <button class="btn btn-primary" id="saveBtn" type="button">등록</button>
            </div>
        </div>
    </main>

    <script>
        const STORAGE_KEY = "clover_notices_v1";

        function pad2(n) { return String(n).padStart(2, "0"); }
        function todayISO() {
            const d = new Date();
            return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
        }

        function loadNotices() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function saveNotices(list) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        }

        function nextId(list) {
            let max = 0;
            list.forEach(n => {
                const id = parseInt(n.id, 10);
                if (!isNaN(id)) max = Math.max(max, id);
            });
            return max + 1;
        }

        const titleEl = document.getElementById("title");
        const authorEl = document.getElementById("author");
        const contentEl = document.getElementById("content");

        document.getElementById("cancelBtn").addEventListener("click", () => {
            window.location.href = "notice.html";
        });

        document.getElementById("saveBtn").addEventListener("click", () => {
            const title = titleEl.value.trim();
            const author = authorEl.value.trim() || "관리자";
            const content = contentEl.value.trim();

            if (!title) {
                alert("제목은 꼭 입력해.");
                titleEl.focus();
                return;
            }
            if (!content) {
                alert("내용도 입력해.");
                contentEl.focus();
                return;
            }

            const list = loadNotices();
            const id = nextId(list);

            list.push({
                id,
                title,
                author,
                date: todayISO(),
                content
            });

            saveNotices(list);

            alert("등록 완료!");
            window.location.href = "notice.html";
        });

          document.addEventListener('click', (e) => {
        if (e.target.classList.contains('logoutBtn')) {
            console.log("로그아웃 버튼 클릭 감지 됨");
            localStorage.removeItem('loginUser');
            location.href = "메인페이지.html";
        }

    })
    </script>

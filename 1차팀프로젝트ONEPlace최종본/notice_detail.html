        function loadNotices() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch {
                return [];
            }
        }

        function escapeHTML(str) {
            return String(str ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function getNoticeById(id) {
            const list = loadNotices();
            const numId = parseInt(id, 10);
            return list.find(n => (n.id === numId) || (String(n.id) === String(id)));
        }

        function renderDetail() {
            seedNoticesIfEmpty();

            const params = new URLSearchParams(location.search);
            const id = params.get("id");

            const area = document.getElementById("detailArea");

            if (!id) {
                area.innerHTML = `
          <div class="error-box">
            공지 ID가 없어.<br/>
            목록에서 다시 들어와줘.
          </div>`;
                return;
            }

            const notice = getNoticeById(id);
            if (!notice) {
                area.innerHTML = `
          <div class="error-box">
            해당 공지사항을 찾을 수 없어.<br/>
            (id: ${escapeHTML(id)})<br/>
            공지 초기화를 누른 뒤 다시 시도해줘.
          </div>`;
                return;
            }

            area.innerHTML = `
        <h2 class="detail-title">${escapeHTML(notice.title)}</h2>
        <div class="detail-meta">
          <span class="meta-pill">작성자: ${escapeHTML(notice.author || "관리자")}</span>
          <span class="meta-pill">등록일: ${escapeHTML(notice.date || todayISO())}</span>
          <span class="meta-pill">공지번호: ${escapeHTML(notice.id)}</span>
        </div>
        <div class="detail-box">
          <div class="detail-content">${escapeHTML(notice.content || "")}</div>
        </div>
      `;
        }

        renderDetail();

        document.getElementById("backBtn").addEventListener("click", () => {
            location.href = "notice.html";
        });

        document.getElementById("resetBtn").addEventListener("click", () => {

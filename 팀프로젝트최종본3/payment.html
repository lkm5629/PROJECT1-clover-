<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" href="Img/logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 | CLOVER HUB</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        .wrapper {
            width: 80%;
            max-width: 900px;
            margin: 60px auto;
        }

        h3 {
            margin: 40px 0 20px;
        }

        .section-box {
            background: white;
            border: 1px solid #ccc;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
        }

        /* 예약 정보 */
        .reservation-info {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .reservation-info img {
            width: 250px;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            max-width: 100%;
            display: block;
        }

        .reservation-text {
            line-height: 1.8;
            word-break: keep-all;
        }

        /* 예약자 정보 */
        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .user-info p {
            margin: 10px 0;
            word-break: break-word;
        }

        .edit-btn {
            padding: 6px 20px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .user-info .edit-btn {
            align-self: flex-end;
        }

        .edit-btn:hover {
            background: #FBCB4C;
        }

        /* 결제 정보 */
        .payment-method label {
            display: block;
            margin: 10px 0;
            word-break: keep-all;
        }

        /* 쿠폰 */
        .coupon input {
            width: 100%;
            max-width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        .coupon-row {
            display: flex;
            gap: 10px;
        }

        .coupon-row input {
            flex: 1;
        }

        .coupon-row button {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .coupon-row button:hover {
            background: #FBCB4C;
        }

        .coupon-main-btn {
            margin-top: 10px;
            margin-left: auto;
            display: block;
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .coupon-main-btn:hover {
            background: #FBCB4C;
        }

        /* 주문 요약 */
        .summary-box {
            width: 60%;
            margin: 30px auto;
            text-align: center;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: nowrap;
            text-align: left;
            gap: 10px;
        }

        .summary-row span {
            width: auto;
            white-space: nowrap;
        }

        .summary-row span:last-child {
            flex-shrink: 0;
        }

        /* 결제 버튼 */
        .pay-btn {
            width: 60%;
            margin: 40px auto;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #333;
            background: white;
            font-size: 18px;
            cursor: pointer;
            display: block;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #FBCB4C;
        }

        hr {
            margin: 60px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        /* ===== 모달 ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            max-width: 100%;
        }

        .modal-content h3 {
            margin-top: 0;
        }

        .modal-content label {
            display: block;
            margin-top: 15px;
            word-break: keep-all;
        }

        .modal-content input {
            width: 100%;
            max-width: 100%;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 5px;
        }

        .coupon-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 12px 0;
            word-break: keep-all;
        }

        .coupon-list input[type="radio"] {
            width: auto;
            max-width: none;
            margin: 0;
            padding: 0;
            flex-shrink: 0;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .modal-buttons button {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .modal-buttons button:hover {
            background: #FBCB4C;
        }

        @media (max-width: 768px) {
            .wrapper {
                width: 92%;
                margin: 30px auto;
            }

            .section-box {
                padding: 20px;
            }

            .reservation-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .reservation-info img {
                width: 100%;
                height: auto;
            }

            .summary-box,
            .pay-btn {
                width: 100%;
            }

            .summary-box {
                margin: 30px 0;
            }

            .summary-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: nowrap;
                text-align: left;
                gap: 10px;
            }

            .summary-row span {
                width: auto;
                white-space: nowrap;
            }

            .summary-row span:last-child {
                flex-shrink: 0;
            }

            .modal-content {
                width: 100%;
                padding: 20px;
            }

            .modal-buttons {
                flex-direction: column;
            }

            .modal-buttons button {
                width: 100%;
            }

            .coupon-main-btn {
                width: 100%;
                margin-top: 10px;
                margin-left: 0;
            }

            .user-info .edit-btn {
                align-self: stretch;
                width: 100%;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <!-- 예약 정보 -->
        <h3>예약 정보</h3>
        <div class="section-box reservation-info">
            <img id="payment-room-img" src="./Img/강의실내부1.png" alt="강의실">
            <div class="reservation-text">
                <p><span id="center-name">클로버 허브 교육센터</span> | <span id="room-name">703호</span></p>
                <p>예약 날짜: <span id="date-text"></span></p>
                <p>예약 인원: <span id="person-text"></span>명</p>
                <p>가격: (시간당) 20,000원</p>
                <p>예약시간: <span id="hour-text"></span>까지</p>
            </div>
        </div>

        <!-- 예약자 정보 -->
        <h3>예약자 정보</h3>
        <div class="section-box user-info">
            <p>예약자: <span id="user-name">김OO</span></p>
            <p>전화번호: <span id="user-phone">010-1234-5678</span></p>
            <p>이메일: <span id="user-email">clover24@email.com</span></p>
            <button class="edit-btn" id="editBtn">수정</button>
        </div>

        <!-- 결제 정보 -->
        <h3>결제 정보</h3>
        <div class="section-box payment-method">
            <label><input type="radio" name="pay" checked> 간편결제(네이버페이, 카카오페이)</label>
            <label><input type="radio" name="pay"> 카드(신용/체크 카드)</label>
            <label><input type="radio" name="pay"> 무통장 입금</label>
        </div>

        <!-- 쿠폰 -->
        <h3>쿠폰 적용</h3>
        <div class="section-box coupon">

            <input type="text" id="couponInput" placeholder="사용 가능한 쿠폰" readonly>

            <button id="applyCouponMain" class="coupon-main-btn">쿠폰 적용</button>

            <div id="couponModal" class="modal">
                <div class="modal-content">
                    <h3>사용 가능한 쿠폰</h3>

                    <div class="coupon-list">
                        <label>
                            <input type="radio" name="couponOption" value="5000">
                            (회원가입 쿠폰)5,000원 할인 쿠폰
                        </label>
                        <label>
                            <input type="radio" name="couponOption" value="10000">
                            (회원가입 쿠폰)10,000원 할인 쿠폰
                        </label>
                    </div>

                    <div class="modal-buttons">
                        <button id="closeCoupon">닫기</button>
                        <button id="applyCoupon">적용</button>
                    </div>
                </div>
            </div>
        </div>

        <hr>

        <!-- 주문 요약 -->
        <h3 style="text-align:center;">주문 요약</h3>
        <div class="section-box summary-box">
            <div class="summary-row">
                <span>대여 가격</span>
                <span id="price-text">0원</span>
            </div>
            <div class="summary-row">
                <span>할인 금액</span>
                <span id="discount-text">0원</span>
            </div>
            <div class="summary-row" style="font-weight:bold; margin-top:20px;">
                <span>총 주문 금액</span>
                <span id="total-text">0원</span>
            </div>
        </div>

        <button class="pay-btn" id="payBtn">결제하기</button>

    </div>

    <!-- 수정 모달 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>예약자 정보 수정</h3>

            <label>예약자</label>
            <input type="text" id="modal-name">

            <label>전화번호</label>
            <input type="text" id="modal-phone">

            <label>이메일</label>
            <input type="text" id="modal-email">

            <div class="modal-buttons">
                <button id="saveUser">저장</button>
                <button id="cancelUser">취소</button>
            </div>
        </div>
    </div>

    <script>

        const params = new URLSearchParams(window.location.search);

        const center = params.get("center");
        const room = params.get("room");
        const date = params.get("date");
        const person = params.get("person");
        const start = params.get("start");
        const end = params.get("end");
        let hour = params.get("hour");
        const img = params.get("img");

        const pricePerHour = 20000;

        if ((!hour || hour === "null") && start !== null && end !== null) {
            hour = String(Math.max(0, parseInt(end, 10) - parseInt(start, 10)));
        }

        if (center) {
            document.getElementById("center-name").textContent = center;
        }

        if (room) {
            document.getElementById("room-name").textContent = room;
        }
        if (img) {
            document.getElementById("payment-room-img").src = img;
        }

        if (date) {
            document.getElementById("date-text").textContent = date;
        }

        if (person) {
            document.getElementById("person-text").textContent = person;
        }

        if (start !== null && end !== null) {
            document.getElementById("hour-text").textContent =
                `${String(start).padStart(2, "0")}:00 ~ ${String(end).padStart(2, "0")}:00`;
        } else if (hour) {
            document.getElementById("hour-text").textContent = `${hour}시간`;
        }

        if (hour) {
            const total = pricePerHour * parseInt(hour, 10);
            document.getElementById("price-text").textContent = total.toLocaleString() + "원";
            document.getElementById("total-text").textContent = total.toLocaleString() + "원";
        }
        document.getElementById("payBtn").addEventListener("click", () => {
            alert("결제가 완료되었습니다!");

            const currentImg = document.getElementById("payment-room-img").src;

            window.location.href =
                `마이페이지.html?tab=reservation&center=${encodeURIComponent(center || "")}&room=${encodeURIComponent(room || "")}&date=${encodeURIComponent(date || "")}&person=${encodeURIComponent(person || "")}&start=${encodeURIComponent(start || "")}&end=${encodeURIComponent(end || "")}&hour=${encodeURIComponent(hour || "")}&img=${encodeURIComponent(currentImg || "")}`;
        });
        // window.location.href =
        //     `마이페이지.html?tab=reservation&center=${encodeURIComponent(center || "")}&room=${encodeURIComponent(room || "")}
        //     &date=${encodeURIComponent(date || "")}&person=${encodeURIComponent(person || "")}&start=${encodeURIComponent(start || "")}&end=${encodeURIComponent(end || "")}&hour=${encodeURIComponent(hour || "")}
        //     &img=${encodeURIComponent(img || "")}`;

        const editBtn = document.querySelector(".edit-btn");
        const modal = document.getElementById("editModal");
        const saveBtn = document.getElementById("saveUser");
        const cancelBtn = document.getElementById("cancelUser");

        const nameEl = document.getElementById("user-name");
        const phoneEl = document.getElementById("user-phone");
        const emailEl = document.getElementById("user-email");

        editBtn.addEventListener("click", () => {
            document.getElementById("modal-name").value = nameEl.textContent;
            document.getElementById("modal-phone").value = phoneEl.textContent;
            document.getElementById("modal-email").value = emailEl.textContent;
            modal.style.display = "flex";
        });

        cancelBtn.addEventListener("click", () => {
            modal.style.display = "none";
        });

        saveBtn.addEventListener("click", () => {
            nameEl.textContent = document.getElementById("modal-name").value;
            phoneEl.textContent = document.getElementById("modal-phone").value;
            emailEl.textContent = document.getElementById("modal-email").value;
            modal.style.display = "none";
        });

        const couponInput = document.getElementById("couponInput");
        const couponModal = document.getElementById("couponModal");
        const applyCouponBtn = document.getElementById("applyCoupon");
        const closeCouponBtn = document.getElementById("closeCoupon");
        const applyCouponMain = document.getElementById("applyCouponMain");
        const discountText = document.getElementById("discount-text");

        let discountAmount = 0;

        applyCouponMain.addEventListener("click", () => {
            couponModal.style.display = "flex";
        });

        closeCouponBtn.addEventListener("click", () => {
            couponModal.style.display = "none";
        });

        applyCouponBtn.addEventListener("click", () => {
            const selectedCoupon = document.querySelector("input[name='couponOption']:checked");

            if (!selectedCoupon) {
                alert("쿠폰을 선택해주세요.");
                return;
            }

            discountAmount = parseInt(selectedCoupon.value, 10);
            couponInput.value = discountAmount.toLocaleString() + "원 할인 쿠폰 적용";

            const totalPrice = pricePerHour * parseInt(hour || "0", 10);
            const finalPrice = Math.max(0, totalPrice - discountAmount);

            discountText.textContent = discountAmount.toLocaleString() + "원";
            document.getElementById("total-text").textContent = finalPrice.toLocaleString() + "원";

            couponModal.style.display = "none";
        });
    </script>

</body>

</html>

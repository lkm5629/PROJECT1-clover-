<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이디 찾기</title>
    <link rel="stylesheet" href="find_id.css">
</head>

<body>
    <div class="container">
        <div class="logo">LOGO</div>

        <div class="find-box">
            <div class="intro">
                우리 로고의 간략 소개<br>
                세줄로 작성
            </div>

            <div class="tab-menu">
                <div class="tab active">아이디 찾기</div>
                <div class="tab" onclick="location.href='#'">비밀번호 찾기</div>
            </div>

            <form id="findIdForm">
                <div class="input-group">
                    <input type="text" id="userContact" placeholder="이메일 또는 전화번호" class="input-field">
                    <button type="button" class="btn-inline" onclick="sendCode()">번호전송</button>
                </div>

                <div class="input-group">
                    <input type="text" id="authCode" placeholder="이메일 인증 코드" class="input-field">
                    <button type="button" class="btn-inline" onclick="verifyCode()">확인</button>
                </div>

                <div id="message" class="error-msg"></div>

                <button type="submit" class="btn-main">아이디 찾기</button>
            </form>

            <div class="footer-links">
                <a href="login.html">아이디 찾기</a>
                <span class="bar">|</span>
                <a href="#">비밀번호 찾기</a>
                <span class="bar">|</span>
                <a href="#">회원가입</a>
            </div>
        </div>
    </div>

    <script>
        const msgArea = document.getElementById('message');

        // 1. [번호전송] 버튼 클릭 시
        function sendCode() {
            const contact = document.getElementById('userContact').value.trim();

            if (!contact) {
                msgArea.innerText = "이메일 또는 전화번호를 입력하세요.";
                msgArea.style.color = "red";
            } else {
                msgArea.innerText = ""; // 기존 메시지 삭제
                alert(contact + "로 인증 코드를 전송했습니다.");
            }
        }

        // 2. [확인] 버튼 클릭 시
        function verifyCode() {
            const code = document.getElementById('authCode').value.trim();

            if (!code) {
                msgArea.innerText = "인증코드를 입력하세요.";
                msgArea.style.color = "red";
            } else {
                msgArea.innerText = "";
                if (code === "1234") { // 예시용 성공 코드
                    alert("인증에 성공했습니다.");
                } else {
                    msgArea.innerText = "인증번호가 일치하지 않습니다.";
                }
            }
        }

        // 3. 마지막 [아이디 찾기] 버튼 클릭 시 (전체 검사)
        document.getElementById('findIdForm').addEventListener('submit', function (e) {
            e.preventDefault(); // 페이지 새로고침 방지

            const contact = document.getElementById('userContact').value.trim();
            const code = document.getElementById('authCode').value.trim();

            if (!contact) {
                msgArea.innerText = "이메일 또는 전화번호를 입력하세요.";
            } else if (!code) {
                msgArea.innerText = "인증코드를 입력하세요.";
            } else {
                msgArea.innerText = "";
                alert("아이디 찾기를 진행합니다.");
                // 여기에 실제 아이디 결과 페이지로 가는 코드를 넣을 수 있습니다.
            }
        });
    </script>
</body>

</html>

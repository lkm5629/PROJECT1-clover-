    <style>
        .notice-wrap {
            width: 86%;
            max-width: 980px;
            margin: 70px auto 100px;
        }

        .notice-title {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 26px 0;
        }

        .notice-box {
            border-top: 1px solid #cfcfcf;
            padding-top: 16px;
        }

        .notice-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .notice-table thead th {
            font-size: 14px;
            font-weight: 900;
            padding: 14px 10px;
            border-bottom: 2px solid #8d8d8d;
            color: #111;
        }

        .notice-table tbody td {
            font-size: 14px;
            padding: 16px 10px;
            border-bottom: 1px solid #e9e9e9;
            color: #111;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 선택 */
        .notice-table th:nth-child(1),
        .notice-table td:nth-child(1) {
            width: 70px;
            text-align: center;
        }

        /* 번호 */
        .notice-table th:nth-child(2),
        .notice-table td:nth-child(2) {
            width: 70px;
            text-align: center;
        }

        /* 제목 */
        .notice-table th:nth-child(3),
        .notice-table td:nth-child(3) {
            width: auto;
            text-align: left;
        }

        /* 글쓴이 */
        .notice-table th:nth-child(4),
        .notice-table td:nth-child(4) {
            width: 110px;
            text-align: center;
        }

        /* 등록일 */
        .notice-table th:nth-child(5),
        .notice-table td:nth-child(5) {
            width: 140px;
            text-align: center;
        }

        .notice-row {
            cursor: pointer;
            transition: 0.15s ease;
        }

        .notice-row:hover {
            background: rgba(251, 203, 76, 0.18);
        }

        .notice-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .notice-btn {
            border: 1px solid #d6d6d6;
            background: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notice-btn:hover {
            background: #FBCB4C;
            border-color: #FBCB4C;
        }

        .empty-box {
            margin-top: 16px;
            padding: 18px;
            border: 1px solid #e6e6e6;
            border-radius: 14px;
            background: #fff;
            color: #333;
            font-weight: 800;
            text-align: center;
        }

        @media (max-width: 1200px) {

            /* 상단바 */
            .top-bar .inner {
                padding: 0 16px;
                justify-content: flex-end;
                /* 가운데 */
                flex-wrap: wrap;
                gap: 8px;
            }

<!DOCTYPE html>
<html lang="ko">

<head>
     <link rel="icon" href="Img/logo.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | CLOVER HUB HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <h1 class="main-title">로그인</h1>
            <p class="sub-desc">서비스 이용을 위해 계정 정보를 입력해 주세요.</p>
        </div>

        <div class="login-box">
            <form onsubmit="handleLogin(event); return false;">
                <div class="input-group">
                    <input type="text" id="userId" placeholder="아이디" class="input-field"
                        onkeydown="if(event.keyCode==13) { event.preventDefault(); document.getElementById('userPw').focus(); }">

                    <div class="pw-input-wrap">
                        <input type="password" id="userPw" placeholder="비밀번호" class="input-field"
                            onkeydown="if(event.keyCode==13) { event.preventDefault(); handleLogin(); }">
                        <button type="button" class="eye-btn" onclick="togglePw('userPw', this)">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                </div>

                <p id="errorMsg" class="error-text"></p>

                <div class="center-btn-wrap">
                    <button type="submit" class="btn-login-yellow">로그인</button>
                </div>

                <div class="social-login">
                    <p class="social-title">간편 로그인</p>
                    <div class="social-buttons">
                        <button type="button" class="btn-social" onclick="location.href='https://accounts.kakao.com/login/?continue=https%3A%2F%2Faccounts.kakao.com%2Fweblogin%2Faccount#login'">
                            <i class="fas fa-comment" style="color: #FEE500;"></i> 카카오로 시작하기
                        </button>
                        <button type="button" class="btn-social" onclick="location.href='https://nid.naver.com/'">
                            <span class="icon" style="color: #03C75A;">N</span> 네이버로 시작하기
                        </button>
                        <button type="button" class="btn-social" onclick="location.href='https://accounts.google.com/v3/signin/identifier?authuser=0&continue=https%3A%2F%2Fwww.google.com%2Fsearch%3Fq%3D%25EA%25B5%25AC%25EA%25B8%2580%2B%25EB%258B%25A4%25EB%25A5%25B8%25EA%25B3%2584%25EC%25A0%2595%2B%25EB%25A1%259C%25EA%25B7%25B8%25EC%259D%25B8%2B%25ED%258E%2598%25EC%259D%25B4%25EC%25A7%2580%26oq%3D%25EA%25B5%25AC%25EA%25B8%2580%2B%25EB%258B%25A4%25EB%25A5%25B8%25EA%25B3%2584%25EC%25A0%2595%2B%25EB%25A1%259C%25EA%25B7%25B8%25EC%259D%25B8%2B%25ED%258E%2598%25EC%259D%25B4%25EC%25A7%2580%26gs_lcrp%3DEgZjaHJvbWUyBggAEEUYOTIMCAEQABgUGIcCGIAEMgcIAhAAGIAEMgcIAxAAGIAEMgcIBBAAGIAEMgcIBRAAGIAEMgcIBhAAGIAEMgoIBxAAGIAEGKIE0gEIMzgyNWowajSoAgCwAgE%26sourceid%3Dchrome%26ie%3DUTF-8&ec=futura_srp_og_si_72236_p&hl=ko&flowName=GlifWebSignIn&flowEntry=AddSession&dsh=S956596967%3A1773189124439898'">
                            <i class="fab fa-google" style="color: #ea4335;"></i> 구글로 시작하기
                        </button>
                    </div>
                </div>

                <div class="login-links">
                    <a href="find_id.html" class="link-item">아이디 찾기</a>
                    <span class="bar">|</span>
                    <a href="find_pw.html" class="link-item">비밀번호 찾기</a>
                    <span class="bar">|</span>
                    <a href="join.html" class="link-item">회원가입</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('span');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function handleLogin(e) {
            if (e) e.preventDefault();
            const userId = document.getElementById('userId').value;
            const userPw = document.getElementById('userPw').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!userId && !userPw) {
                errorMsg.textContent = "아이디와 비밀번호를 입력하세요.";
                errorMsg.style.display = "block";
                return;
            } else if (!userId) {
                errorMsg.textContent = "아이디를 입력하세요.";
                errorMsg.style.display = "block";
                document.getElementById('userId').focus();
                return;
            } else if (!userPw) {
                errorMsg.textContent = "비밀번호를 입력하세요.";
                errorMsg.style.display = "block";
                document.getElementById('userPw').focus();
                return;
            }

            const UserList = JSON.parse(localStorage.getItem('User')) || [];
            const user = UserList.find(u => u.id === userId && u.pw === userPw);

            if (user) {
                errorMsg.style.display = "none";
                localStorage.setItem('loginUser', JSON.stringify(user));
                alert(user.nick + "님 환영합니다!");
                window.location.href = '메인페이지.html';
            } else {
                errorMsg.textContent = "아이디 또는 비밀번호가 일치하지 않습니다.";
                errorMsg.style.display = "block";
            }
        }
    </script>
</body>

</html>

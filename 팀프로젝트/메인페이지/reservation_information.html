<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 정보</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #hr1 {
            width: 80vw;
            position: fixed;
            margin: auto;
        }

        /* 드롭다운 */
        #open-f {
            margin-top: 10vh;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 30px;
            border: 1px solid #ddd;
            border-radius: 999px;
            cursor: pointer;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        #category-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 5px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-width: 120px;
            z-index: 100;
        }

        #category-dropdown .year-item {
            padding: 10px 20px;
            cursor: pointer;
        }

        #category-dropdown .year-item:hover {
            background-color: #FBCB4C;
            color: black;
        }

        #open-f-img {
            width: 10px;
            margin-left: 5px;
        }

        /* 예약 정보 박스 */
        #reservation_info {
            margin-top: 5vh;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            height: auto;
            border-radius: 20px;
            border: 2px solid #949494fc;
            box-sizing: border-box;
        }

        /* 공용 버튼 스타일 */
        .room_info {
            display: inline-block;
            margin-top: 10px;
            margin-right: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #FBCB4C;
            color: black;
            border: none;
            transition: all 0.2s;
        }

        /* 호실 정보는 hover 제거 */
        .label {
            cursor: default;
            background-color: white;
            color: black;
            border: 1px solid #ddd;
        }

        .room_info:not(.label):hover {
            background-color: #ffffff;
            border: 1px solid #FBCB4C;
        }

        /* 예약 취소 버튼 */
        .room_info_cancle {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #ffffff;
            color: black;
            border: 1px solid #FBCB4C;
            transition: all 0.2s;
        }

        .room_info_cancle:hover {
            background-color: #FBCB4C;
            border: 1px solid #ffffff;
        }

        /* 예약 이미지와 텍스트 */
        .room_detail {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        #reservation_info_img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .room_text {
            font-size: 14px;
            line-height: 1.6;
            flex: 1;
            min-width: 150px;
        }

        /* 버튼 그룹 */
        #room_info_btn {
            display: flex;
            justify-content: space-between;
            /* 왼쪽 버튼은 왼쪽, 예약 취소는 오른쪽 */
            flex-wrap: wrap;
            margin-top: 15px;
            align-items: center;
        }

        #room_info_btn>.left-btns {
            display: flex;
            gap: 10px;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            #reservation_info {
                padding: 15px;
            }

            .room_detail {
                flex-direction: column;
                gap: 10px;
            }

            #reservation_info_img {
                max-width: 100%;
                height: auto;
            }

            .room_text {
                font-size: 13px;
            }

            #room_info_btn {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            #room_info_btn>.left-btns,
            .room_info_cancle {
                width: 60%;
                text-align: center;
            }

            #open-f {
                width: 80px;
                height: 28px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div>
        <p>예약 정보</p>
    </div>
    <hr id="hr1">

    <!-- 드롭다운 -->
    <div class="dropdown">
        <span id="open-f">기간
            <img id="open-f-img" src="./Img/images1.png" alt="다운아이콘">
        </span>
        <div id="category-dropdown">
            <div class="year-item">2026년</div>
            <div class="year-item">2025년</div>
        </div>
    </div>

    <!-- 예약 정보 -->
    <div id="reservation_info">
        <span class="room_info label">호실 정보</span>
        <div class="room_detail">
            <img id="reservation_info_img" src="./Img/강의실내부4.png" alt="강의실4">
            <span class="room_text">
                <strong>|클로버 교육센터|</strong><br><br>
                예약자: 김OO<br>
                호실: 703호<br>
                이용 일자: 2025/04/02<br>
                총 이용 시간: 14:00 ~ 17:00(3시간)<br>
                운영 시간: 24시간 연중무휴
            </span>
        </div>

        <!-- 버튼들 -->
        <div id="room_info_btn">
            <div class="left-btns">
                <span class="room_info" id="change_room">호실 변경</span>
                <span class="room_info" id="change_time">시간 변경</span>
            </div>
            <span class="room_info_cancle">예약 취소</span>
        </div>
    </div>
    <!-- 🔹 수정 모달 -->
    <div id="edit_modal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.4);
justify-content:center;
align-items:center;
z-index:999;">

        <div style="
    background:white;
    padding:20px;
    border-radius:15px;
    width:260px;
    text-align:center;">

            <h3>예약 수정</h3>

            <!-- 호실 선택 -->
            <div id="room_select" style="display:none; margin-top:10px;">
                <select id="room_option">
                    <option value="701호">701호</option>
                    <option value="702호">702호</option>
                    <option value="703호">703호</option>
                    <option value="704호">704호</option>
                    <option value="705호">705호</option>
                </select>
            </div>

            <!-- 시간 선택 -->
            <div id="time_select" style="display:none; margin-top:10px;">
                <select id="time_option">
                    <option value="09:00 ~ 12:00(3시간)">01:00 ~ 03:00(3시간)</option>
                    <option value="09:00 ~ 12:00(3시간)">03:00 ~ 06:00(3시간)</option>
                    <option value="09:00 ~ 12:00(3시간)">06:00 ~ 09:00(3시간)</option>
                    <option value="09:00 ~ 12:00(3시간)">09:00 ~ 12:00(3시간)</option>
                    <option value="14:00 ~ 17:00(3시간)">14:00 ~ 17:00(3시간)</option>
                    <option value="18:00 ~ 21:00(3시간)">18:00 ~ 21:00(3시간)</option>
                </select>
            </div>

            <div style="margin-top:15px; display:flex; justify-content:space-between;">
                <button id="save_btn">저장</button>
                <button id="close_btn">취소</button>
            </div>

        </div>
    </div>
    <script>
        const openBtn = document.getElementById("open-f");
        const dropdown = document.getElementById("category-dropdown");

        openBtn.addEventListener("click", () => {
            dropdown.style.display =
                dropdown.style.display === "block" ? "none" : "block";
        });

        const changeRoomBtn = document.getElementById("change_room");
        const changeTimeBtn = document.getElementById("change_time");
        const editModal = document.getElementById("edit_modal");

        const roomSelectBox = document.getElementById("room_select");
        const timeSelectBox = document.getElementById("time_select");

        const roomOption = document.getElementById("room_option");
        const timeOption = document.getElementById("time_option");

        const saveBtn = document.getElementById("save_btn");
        const closeBtn = document.getElementById("close_btn");

        const roomTextBox = document.querySelector(".room_text");
        const roomImage = document.getElementById("reservation_info_img");

        let editType = "";

        /* 현재 정보 가져오기 */
        function getInfo() {
            const text = roomTextBox.innerText;

            return {
                center: text.match(/\|(.+)\|/)?.[1],
                reserver: text.match(/예약자:\s(.+)/)?.[1],
                room: text.match(/호실:\s(.+)/)?.[1],
                date: text.match(/이용 일자:\s(.+)/)?.[1],
                time: text.match(/총 이용 시간:\s(.+)/)?.[1]
            };
        }

        /* 화면 다시 그리기 */
        function render(info) {

            roomTextBox.innerHTML = `
            <strong>|${info.center}|</strong><br><br>
            예약자: ${info.reserver}<br>
            호실: ${info.room}<br>
            이용 일자: ${info.date}<br>
            총 이용 시간: ${info.time}<br>
            운영 시간: 24시간 연중무휴
        `;

            const roomImages = {
                "701호": "./Img/강의실내부1.png",
                "702호": "./Img/강의실내부5.png",
                "703호": "./Img/강의실내부4.png",
                "704호": "./Img/강의실내부3.png",
                "705호": "./Img/강의실내부2.png"
            };

            roomImage.src = roomImages[info.room];
        }

        /* 🔹 호실 변경 */
        changeRoomBtn.addEventListener("click", function () {

            editType = "room";
            editModal.style.display = "flex";

            roomSelectBox.style.display = "block";
            timeSelectBox.style.display = "none";

            const info = getInfo();
            roomOption.value = info.room; // 기존 값 기본 선택
        });

        /* 🔹 시간 변경 */
        changeTimeBtn.addEventListener("click", function () {

            editType = "time";
            editModal.style.display = "flex";

            roomSelectBox.style.display = "none";
            timeSelectBox.style.display = "block";

            const info = getInfo();
            timeOption.value = info.time; // 기존 값 기본 선택
        });

        /* 🔹 저장 */
        saveBtn.addEventListener("click", function () {

            const info = getInfo();

            if (editType === "room") {
                info.room = roomOption.value;
            }

            if (editType === "time") {
                info.time = timeOption.value;
            }

            render(info);
            editModal.style.display = "none";
        });

        /* 🔹 닫기 */
        closeBtn.addEventListener("click", function () {
            editModal.style.display = "none";
        });

        editModal.addEventListener("click", function (e) {
            if (e.target === editModal) {
                editModal.style.display = "none";
            }
        });

        /* 🔹 예약 취소 */
        const cancelBtn = document.querySelector(".room_info_cancle");

        cancelBtn.addEventListener("click", function () {

            if (confirm("예약을 취소하시겠습니까?")) {

                document.getElementById("reservation_info").style.display = "none";

                window.history.replaceState({}, document.title, "reservation_information.html");

                alert("예약이 취소되었습니다.");
            }
        });
    </script>

</body>

</html>

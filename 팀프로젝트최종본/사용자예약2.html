<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약 정보</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #page-title {
            margin: 24px 0 10px 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #hr1 {
            width: 90%;
            margin: 0 auto 20px;
            border: none;
            border-top: 1px solid #ddd;
        }

        /* 드롭다운 */
        .dropdown {
            position: relative;
            display: inline-block;
            margin-left: 20px;
            margin-top: 10px;
        }

        #open-f {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 30px;
            border: 1px solid #ddd;
            border-radius: 999px;
            cursor: pointer;
            background: #fff;
        }

        #category-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 5px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-width: 140px;
            z-index: 100;
        }

        #category-dropdown .year-item {
            padding: 10px 20px;
            cursor: pointer;
        }

        #category-dropdown .year-item:hover {
            background-color: #FBCB4C;
            color: black;
        }

        #open-f-img {
            width: 10px;
            margin-left: 5px;
        }

        /* 예약 정보 박스 */
        #reservation_info {
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            height: auto;
            border-radius: 20px;
            border: 2px solid #949494fc;
            box-sizing: border-box;
        }

        /* 공용 버튼 스타일 */
        .room_info {
            display: inline-block;
            margin-top: 10px;
            margin-right: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #FBCB4C;
            color: black;
            border: none;
            transition: all 0.2s;
        }

        .label {
            cursor: default;
            background-color: white;
            color: black;
            border: 1px solid #ddd;
        }

        .room_info:not(.label):hover {
            background-color: #ffffff;
            border: 1px solid #FBCB4C;
        }

        /* 예약 취소 버튼 */
        .room_info_cancle {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #ffffff;
            color: black;
            border: 1px solid #FBCB4C;
            transition: all 0.2s;
        }

        .room_info_cancle:hover {
            background-color: #FBCB4C;
            border: 1px solid #ffffff;
        }

        /* 예약 이미지와 텍스트 */
        .room_detail {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        #reservation_info_img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .room_text {
            font-size: 14px;
            line-height: 1.8;
            flex: 1;
            min-width: 150px;
        }

        /* 버튼 그룹 */
        #room_info_btn {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 15px;
            align-items: center;
        }

        #room_info_btn>.left-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 모달 */
        #edit_modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 260px;
            text-align: center;
        }

        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        #save_btn,
        #close_btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }

        #save_btn:hover,
        #close_btn:hover {
            background: #FBCB4C;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            #reservation_info {
                padding: 15px;
            }

            .room_detail {
                flex-direction: column;
                gap: 10px;
            }

            #reservation_info_img {
                max-width: 100%;
                height: auto;
            }

            .room_text {
                font-size: 13px;
            }

            #room_info_btn {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            #room_info_btn>.left-btns,
            .room_info_cancle {
                width: 60%;
                text-align: center;
                justify-content: center;
            }

            #open-f {
                width: 80px;
                height: 28px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div>
        <p id="page-title">예약 정보</p>
    </div>
    <hr id="hr1">

    <!-- 드롭다운 -->
    <div class="dropdown">
        <span id="open-f">기간
            <img id="open-f-img" src="./Img/images1.png" alt="다운아이콘">
        </span>
        <div id="category-dropdown">
            <div class="year-item" id="selected-period">선택된 예약</div>
        </div>
    </div>

    <!-- 예약 정보 -->
    <div id="reservation_info">
        <span class="room_info label">주문 요약</span>
        <div class="room_detail">
            <img id="reservation_info_img" src="./Img/강의실내부4.png" alt="강의실">
            <span class="room_text" id="room_text_box">
                <strong>|클로버 허브 교육센터|</strong><br><br>
                예약자: 김OO<br>
                호실: 703호<br>
                이용 일자: 2026-04-02<br>
                예약 인원: 1명<br>
                총 이용 시간: 14:00 ~ 17:00 (3시간)<br>
                총 주문 금액: 60,000원<br>
                운영 시간: 24시간 연중무휴
            </span>
        </div>

        <!-- 버튼들 -->
        <div id="room_info_btn">
            <div class="left-btns">
                <span class="room_info" id="change_room">호실 변경</span>
                <span class="room_info" id="change_time">시간 변경</span>
            </div>
            <span class="room_info_cancle" id="cancel_btn">예약 취소</span>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div id="edit_modal">
        <div class="modal-box">
            <h3>예약 수정</h3>

            <!-- 호실 선택 -->
            <div id="room_select" style="display:none; margin-top:10px;">
                <select id="room_option">
                    <option value="701호">701호</option>
                    <option value="702호">702호</option>
                    <option value="703호">703호</option>
                    <option value="704호">704호</option>
                    <option value="705호">705호</option>
                    <option value="706호">706호</option>
                    <option value="707호">707호</option>
                    <option value="708호">708호</option>
                    <option value="709호">709호</option>
                    <option value="710호">710호</option>
                    <option value="711호">711호</option>
                    <option value="712호">712호</option>

                    <option value="801호">801호</option>
                    <option value="802호">802호</option>
                    <option value="803호">803호</option>
                    <option value="804호">804호</option>
                    <option value="805호">805호</option>
                    <option value="806호">806호</option>
                    <option value="807호">807호</option>
                    <option value="808호">808호</option>
                    <option value="809호">809호</option>
                    <option value="810호">810호</option>
                    <option value="811호">811호</option>
                </select>
            </div>

            <!-- 시간 선택 -->
            <div id="time_select" style="display:none; margin-top:10px;">
                <select id="time_option">
                    <option value="01:00 ~ 03:00">01:00 ~ 03:00</option>
                    <option value="03:00 ~ 06:00">03:00 ~ 06:00</option>
                    <option value="06:00 ~ 09:00">06:00 ~ 09:00</option>
                    <option value="09:00 ~ 12:00">09:00 ~ 12:00</option>
                    <option value="12:00 ~ 15:00">12:00 ~ 15:00</option>
                    <option value="14:00 ~ 17:00">14:00 ~ 17:00</option>
                    <option value="18:00 ~ 21:00">18:00 ~ 21:00</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button id="save_btn">저장</button>
                <button id="close_btn">취소</button>
            </div>
        </div>
    </div>

  <script src="./마이페이지.js"></script>
</body>

</html>

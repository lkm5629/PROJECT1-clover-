<!DOCTYPE html>
<html lang="ko">

<head>
    <link rel="icon" href="Img/logo.png" type="image/png">
    <link rel="icon" href="Img/logo.png" type="image/png">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>예약 정보 | CLOVER HUB</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        #page-title {
            margin: 24px 0 10px 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #hr1 {
            width: 90%;
            margin: 0 auto 20px;
            border: none;
            border-top: 1px solid #ddd;
        }

        /* 드롭다운 */
        .dropdown {
            position: relative;
            display: inline-block;
            margin-left: 20px;
            margin-top: 10px;
        }

        #open-f {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 30px;
            border: 1px solid #ddd;
            border-radius: 999px;
            cursor: pointer;
            background: #fff;
        }

        #category-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 5px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-width: 140px;
            z-index: 100;
        }

        #category-dropdown .year-item {
            padding: 10px 20px;
            cursor: pointer;
        }

        #category-dropdown .year-item:hover {
            background-color: #FBCB4C;
            color: black;
        }

        #open-f-img {
            width: 10px;
            margin-left: 5px;
        }

        /* 예약 정보 박스 */
        #reservation_info {
            margin: 20px auto;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            height: auto;
            border-radius: 20px;
            border: 2px solid #949494fc;
            box-sizing: border-box;
        }

        /* 공용 버튼 스타일 */
        .room_info {
            display: inline-block;
            margin-top: 10px;
            margin-right: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #FBCB4C;
            color: black;
            border: none;
            transition: all 0.2s;
        }

        .label {
            cursor: default;
            background-color: white;
            color: black;
            border: 1px solid #ddd;
        }

        .room_info:not(.label):hover {
            background-color: #ffffff;
            border: 1px solid #FBCB4C;
        }

        /* 예약 취소 버튼 */
        .room_info_cancle {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 14px;
            border-radius: 999px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            background-color: #ffffff;
            color: black;
            border: 1px solid #FBCB4C;
            transition: all 0.2s;
        }

        .room_info_cancle:hover {
            background-color: #FBCB4C;
            border: 1px solid #ffffff;
        }

        /* 예약 이미지와 텍스트 */
        .room_detail {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        #reservation_info_img {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 20px;
            flex-shrink: 0;
        }

        .room_text {
            font-size: 14px;
            line-height: 1.8;
            flex: 1;
            min-width: 150px;
        }

        /* 버튼 그룹 */
        #room_info_btn {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-top: 15px;
            align-items: center;
        }

        #room_info_btn>.left-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 모달 */
        #edit_modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 260px;
            text-align: center;
        }

        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        #save_btn,
        #close_btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }

        #save_btn:hover,
        #close_btn:hover {
            background: #FBCB4C;
        }

        /* 모바일 대응 */
        @media (max-width: 600px) {
            #reservation_info {
                padding: 15px;
            }

            .room_detail {
                flex-direction: column;
                gap: 10px;
            }

            #reservation_info_img {
                max-width: 100%;
                height: auto;
            }

            .room_text {
                font-size: 13px;
            }

            #room_info_btn {
                flex-direction: column;
                gap: 10px;
                align-items: center;
            }

            #room_info_btn>.left-btns,
            .room_info_cancle {
                width: 60%;
                text-align: center;
                justify-content: center;
            }

            #open-f {
                width: 80px;
                height: 28px;
                font-size: 13px;
            }
        }
    </style>
</head>

        function formatNumber(num) {
            return Number(num || 0).toLocaleString("ko-KR");
        }

        function calcHour(start, end) {
            const s = parseInt(start, 10);
            const e = parseInt(end, 10);
            if (isNaN(s) || isNaN(e)) return 0;
            return Math.max(0, e - s);
        }

        function parseHoursFromText(timeText) {
            const match = String(timeText).match(/(\d{1,2}):00\s*~\s*(\d{1,2}):00/);
            if (!match) return 0;
            const start = parseInt(match[1], 10);
            const end = parseInt(match[2], 10);
            return Math.max(0, end - start);
        }

        function pad2(n) {
            return String(n).padStart(2, "0");
        }

        const params = new URLSearchParams(window.location.search);

        let info = {
            center: params.get("center") || "클로버 허브 교육센터",
            reserver: "김OO",
            room: params.get("room") || "703호",
            date: params.get("date") || "2026-04-02",
            person: params.get("person") || "1",
            start: params.get("start"),
            end: params.get("end"),
            hour: params.get("hour"),
            img: params.get("img") || ""
        };

        if ((!info.hour || info.hour === "null") && info.start !== null && info.end !== null) {
            info.hour = String(calcHour(info.start, info.end));
        }

        if (info.start !== null && info.end !== null) {
            info.time = `${pad2(info.start)}:00 ~ ${pad2(info.end)}:00`;
        } else if (info.hour) {
            info.time = `${info.hour}시간`;
        } else {
            info.time = "시간 정보 없음";
        }

        function render(data) {
            const hours = data.hour ? parseInt(data.hour, 10) : parseHoursFromText(data.time);
            const totalPrice = pricePerHour * (isNaN(hours) ? 0 : hours);

            roomTextBox.innerHTML = `
                <strong>|${data.center}|</strong><br><br>
                예약자: ${data.reserver}<br>
                호실: ${data.room}<br>
                이용 일자: ${data.date}<br>
                예약 인원: ${data.person}명<br>
                총 이용 시간: ${data.time} (${hours}시간)<br>
                총 주문 금액: ${formatNumber(totalPrice)}원<br>
                운영 시간: 24시간 연중무휴
            `;

            roomImage.src = data.img || roomImages[data.room] || "./Img/강의실내부4.png";

            const dateParts = String(data.date).split("-");
            if (dateParts.length >= 2) {
                selectedPeriod.textContent = `${dateParts[0]}년 ${parseInt(dateParts[1], 10)}월`;
            }
        }

            editModal.style.display = "flex";
            roomSelectBox.style.display = "block";
            timeSelectBox.style.display = "none";
            roomOption.value = info.room;
        });

        changeTimeBtn.addEventListener("click", function () {
            editType = "time";
            editModal.style.display = "flex";
            roomSelectBox.style.display = "none";
            timeSelectBox.style.display = "block";
            timeOption.value = info.time.includes("~") ? info.time : "09:00 ~ 12:00";
        });

        saveBtn.addEventListener("click", function () {
            if (editType === "room") {
                info.room = roomOption.value;
            }

            if (editType === "time") {
                info.time = timeOption.value;
                const match = info.time.match(/(\d{1,2}):00\s*~\s*(\d{1,2}):00/);
                if (match) {
                    info.start = match[1];
                    info.end = match[2];
                    info.hour = String(parseInt(match[2], 10) - parseInt(match[1], 10));
                }
            }

            render(info);
            editModal.style.display = "none";
        });

        closeBtn.addEventListener("click", function () {
            editModal.style.display = "none";
        });

        editModal.addEventListener("click", function (e) {
            if (e.target === editModal) {
                editModal.style.display = "none";
            }
        });

        document.getElementById("cancel_btn").addEventListener("click", function () {

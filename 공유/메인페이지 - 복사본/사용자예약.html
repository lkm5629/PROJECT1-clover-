    <!-- 기간 -->
    <div class="dropdown">
        <span id="open-f">기간
            <img id="open-f-img" src="./Img/images1.png" alt="다운아이콘" />
        </span>
        <span id="period-text">선택 없음</span>
        <div id="category-dropdown"></div>
    </div>

    <!-- 예약 내역 -->
    <div id="reservation_list"></div>

    <template id="reservation_template">
        <div class="reservation-card">
            <span class="room_info label">호실 정보</span>

            <div class="room_detail">
                <img class="reservation_info_img" src="" alt="강의실" />
                <span class="room_text">
                    <strong class="center-name"></strong><br /><br />
                    예약자: <span class="reserver-name"></span><br />
                    호실: <span class="room-name"></span><br />
                    이용 일자: <span class="use-date"></span><br />
                    총 이용 시간: <span class="use-time"></span><br />
                    운영 시간: 24시간 연중무휴
                </span>
            </div>

            <div class="room_info_btn">
                <div class="left-btns">
                    <span class="room_info change_room">호실 변경</span>
                    <span class="room_info change_time">시간 변경</span>
                </div>
                <span class="room_info_cancle cancel_btn">예약 취소</span>
            </div>
        </div>
    </template>

    <!-- 수정 모달 -->
    <div id="edit_modal">
        <div class="modal-box">
            <h3>예약 수정</h3>

            <div id="room_select" style="display:none;">
                <select id="room_option">
                    <option value="701호">701호</option>
                    <option value="702호">702호</option>
                    <option value="703호">703호</option>
                    <option value="704호">704호</option>
                    <option value="705호">705호</option>
                </select>
            </div>

            <div id="time_select" style="display:none;">
                <select id="time_option">
                    <option value="01:00 ~ 03:00(2시간)">01:00 ~ 03:00(2시간)</option>
                    <option value="03:00 ~ 06:00(3시간)">03:00 ~ 06:00(3시간)</option>
                    <option value="06:00 ~ 09:00(3시간)">06:00 ~ 09:00(3시간)</option>
                    <option value="09:00 ~ 12:00(3시간)">09:00 ~ 12:00(3시간)</option>
                    <option value="14:00 ~ 17:00(3시간)">14:00 ~ 17:00(3시간)</option>
                    <option value="18:00 ~ 21:00(3시간)">18:00 ~ 21:00(3시간)</option>
                </select>
            </div>

            <div class="modal-buttons">
                <button id="close_btn">취소</button>
                <button id="save_btn">저장</button>
            </div>
        </div>
    </div>

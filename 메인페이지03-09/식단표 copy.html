<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식단 안내 시스템</title>
    <link rel="stylesheet" href="./식단표.css">
    <link rel="stylesheet" href="./common.css">
</head>

<body>
    <header id="header-include" class="hdr"></header>
    <div class="main-container">

        <header class="top-bar1">
            <h1>식단 안내</h1>
            <div class="origin-tag">
                📍 <strong>원산지 고정 안내</strong><br>
                쌀: 국내산 | 김치: 국내산 | 돼지고기: 제주산 | 소고기: 호주산 | 닭고기: 국내산
            </div>
        </header>

        <section class="control-panel">
            <div class="week-selector">
                <button class="arrow-btn" onclick="changeDate(-1)">❮</button>
                <h2 id="weekDisplay">2026년 3월 6일</h2>
                <button class="calendar-btn" onclick="toggleCalendar()">📅</button>
                <button class="arrow-btn" onclick="changeDate(1)">❯</button>
            </div>
        </section>

        <section class="filter-section">
            <div class="filter-box allergy-box">
                <div class="filter-title">⚠️ 알레르기 유발 물질</div>
                <div class="filter-options">
                    <label><input type="checkbox" id="noAllergy" onclick="clearAllergies()"> 없음</label>
                    <label><input type="checkbox" name="allergy" value="땅콩" onchange="updateUI()"> 땅콩</label>
                    <label><input type="checkbox" name="allergy" value="갑각류" onchange="updateUI()"> 갑각류</label>
                    <label><input type="checkbox" name="allergy" value="우유" onchange="updateUI()"> 우유</label>
                    <button class="more-btn" onclick="toggleMoreAllergy()">▼ 더보기</button>
                </div>

                <div id="moreAllergyContent" class="more-allergy-grid">
                    <label><input type="checkbox" name="allergy" value="난류" onchange="updateUI()"> 난류</label>
                    <label><input type="checkbox" name="allergy" value="메밀" onchange="updateUI()"> 메밀</label>
                    <label><input type="checkbox" name="allergy" value="대두" onchange="updateUI()"> 대두</label>
                    <label><input type="checkbox" name="allergy" value="복숭아" onchange="updateUI()"> 복숭아</label>
                    <label><input type="checkbox" name="allergy" value="토마토" onchange="updateUI()"> 토마토</label>
                    <label><input type="checkbox" name="allergy" value="호두" onchange="updateUI()"> 호두</label>
                    <label><input type="checkbox" name="allergy" value="닭고기" onchange="updateUI()"> 닭고기</label>
                    <label><input type="checkbox" name="allergy" value="쇠고기" onchange="updateUI()"> 쇠고기</label>
                    <label><input type="checkbox" name="allergy" value="밀" onchange="updateUI()"> 밀</label>
                    <label><input type="checkbox" name="allergy" value="고등어" onchange="updateUI()"> 고등어</label>
                    <label><input type="checkbox" name="allergy" value="게" onchange="updateUI()"> 게</label>
                    <label><input type="checkbox" name="allergy" value="새우" onchange="updateUI()"> 새우</label>
                    <label><input type="checkbox" name="allergy" value="돼지고기" onchange="updateUI()"> 돼지고기</label>
                    <label><input type="checkbox" name="allergy" value="오징어" onchange="updateUI()"> 오징어</label>
                    <label><input type="checkbox" name="allergy" value="조개류" onchange="updateUI()"> 조개류</label>
                    <label><input type="checkbox" name="allergy" value="홍합" onchange="updateUI()"> 홍합</label>
                    <label><input type="checkbox" name="allergy" value="전복" onchange="updateUI()"> 전복</label>
                    <label><input type="checkbox" name="allergy" value="굴" onchange="updateUI()"> 굴</label>
                </div>
            </div>

            <div class="filter-box vegan-box">
                <div class="filter-title">🌱 비건 카테고리</div>
                <div class="filter-options">
                    <label><input type="radio" name="vegan" id="veganNone" value="없음" checked
                            onclick="resetFocus(); updateUI();"> 없음</label>
                    <label><input type="radio" name="vegan" id="veganMode" value="비건" onclick="handleVeganClick()"> 비건
                        모드</label>
                </div>
            </div>
        </section>

        <div id="mealGrid" class="grid-wrapper"></div>
    </div>

    <div id="calendarModal" class="modal-overlay">
        <div class="modal-content calendar-modal-content">
            <div class="modal-header">
                <button class="cal-nav-btn" onclick="moveMonth(-1)">❮</button>
                <span id="calMonthDisplay"></span>
                <button class="cal-nav-btn" onclick="moveMonth(1)">❯</button>
                <button class="close-btn" onclick="toggleCalendar()">✕</button>
            </div>
            <div class="cal-days-header">
                <div class="sun">일</div>
                <div>월</div>
                <div>화</div>
                <div>수</div>
                <div>목</div>
                <div>금</div>
                <div class="sat">토</div>
            </div>
            <div id="calendarGrid" class="cal-grid"></div>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay">
        <div class="alert-content">
            <h3 id="alertMenuName">상세 정보</h3>
            <div class="alert-body">
                <p id="alertTitle" class="warning-title">⚠️ 알림</p>
                <p id="alertMessage"></p>
                <div class="symptom-info" id="symptomBox">
                    <strong>추가 정보:</strong> <span id="symptomText"></span>
                </div>
            </div>
            <button class="confirm-btn" onclick="closeAlert()">확인</button>
        </div>
    </div>
<footer id="footer-include" class="ftr"></footer>
<script src="./식단표.js"></script>
<script src="./common.js"></script>
</body>

</html>

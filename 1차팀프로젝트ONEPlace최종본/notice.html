<head>

    <style>
        .notice-wrap {
            width: 86%;
            max-width: 980px;
            margin: 70px auto 100px;
        }

        .notice-title {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            margin: 0 0 26px 0;
        }

        .notice-box {
            border-top: 1px solid #cfcfcf;
            padding-top: 16px;
        }

        .notice-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .notice-table thead th {
            font-size: 14px;
            font-weight: 900;
            padding: 14px 10px;
            border-bottom: 2px solid #8d8d8d;
            color: #111;
        }

        .notice-table tbody td {
            font-size: 14px;
            padding: 16px 0px;
            border-bottom: 1px solid #e9e9e9;
            color: #111;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 선택 */
        .notice-table th:nth-child(1),
        .notice-table td:nth-child(1) {
            width: 70px;
            text-align: center;
        }

        /* 번호 */
        .notice-table th:nth-child(2),
        .notice-table td:nth-child(2) {
            width: 70px;
            text-align: center;
        }

        /* 제목 */
        .notice-table th:nth-child(3),
        .notice-table td:nth-child(3) {
            width: auto;
            text-align: left;
        }

        /* 글쓴이 */
        .notice-table th:nth-child(4),
        .notice-table td:nth-child(4) {
            width: 110px;
            text-align: center;
        }

        /* 등록일 */
        .notice-table th:nth-child(5),
        .notice-table td:nth-child(5) {
            width: 140px;
            text-align: center;
        }

        .notice-row {
            cursor: pointer;
            transition: 0.15s ease;
        }

        .notice-row:hover {
            background: rgba(251, 203, 76, 0.18);
        }

        .notice-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .notice-btn {
            border: 1px solid #d6d6d6;
            background: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .notice-btn:hover {
            background: #FBCB4C;
            border-color: #FBCB4C;
        }

        .empty-box {
            margin-top: 16px;
            padding: 18px;
            border: 1px solid #e6e6e6;
            border-radius: 14px;
            background: #fff;
            color: #333;
            font-weight: 800;
            text-align: center;
        }

        @media (max-width: 1200px) {

            /* 상단바 */
            .top-bar .inner {
                padding: 0 16px;
                justify-content: flex-end;
                /* 가운데 */
                flex-wrap: wrap;
                gap: 8px;
            }

            /* 네비 */
            .nav .inner {
                padding: 0 16px;
                display: flex;
                flex-direction: column;
                /* 로고 위 / 메뉴 아래 */
                align-items: center;
                /* 가운데 */
                gap: 10px;
            }

            .nav .logo {
                width: 100%;
                margin: 0;
                text-align: center;
                /* 로고 가운데 */
            }

            .nav .gnb {
                width: 100%;
                display: flex;
                justify-content: center;
                /* 메뉴 가운데 */
                flex-wrap: wrap;
                /* 줄바꿈 */
                gap: 10px;
                margin: 0;
                padding: 0;
            }

            .nav .gnb a {
                font-size: 13px;
                padding: 6px 8px;
                display: inline-block;
                white-space: nowrap;
            }
        }

        @media (max-width: 768px) {
            .notice-wrap {
                width: 92%;
                margin: 40px auto 70px;
            }

            .notice-title {
                font-size: 22px;
                margin-bottom: 18px;
            }

            .notice-table {
                table-layout: fixed;
            }

            .notice-table tbody td{
                font-size: 7px;
            }
            .notice-table th,
            .notice-table td {
                font-size: 12px;
                padding: 12px 6px;
                white-space: nowrap;
            }

            .notice-table th:nth-child(1),
            .notice-table td:nth-child(1) {
                width: 58px;
                text-align: center;
            }

            .notice-table th:nth-child(2),
            .notice-table td:nth-child(2) {
                width: 52px;
                text-align: center;
            }

            .notice-table th:nth-child(4),
            .notice-table td:nth-child(4) {
                width: 70px;
            }

            .notice-table th:nth-child(5),
            .notice-table td:nth-child(5) {
                width: 78px;
            }

            .notice-table th:nth-child(3),
            .notice-table td:nth-child(3) {
                width: auto;
                max-width: 120px;
            }

            .notice-table td:nth-child(3) {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
        }
        
    </style>

</head>

    <main class="notice-wrap">
        <h2 class="notice-title">공지사항</h2>

        <section class="notice-box">
            <table class="notice-table" aria-label="공지사항 목록">
                <thead>
                    <tr>
                        <th>선택</th>
                        <th>번호</th>
                        <th>제목</th>
                        <th>글쓴이</th>
                        <th>등록일</th>
                    </tr>
                </thead>
                <tbody id="noticeTbody"></tbody>
            </table>

            <div id="emptyBox" class="empty-box" style="display:none;">등록된 공지사항이 없어.</div>

            <div class="notice-actions">
                <button class="notice-btn" id="deleteSelectedBtn" type="button">삭제(선택)</button>
                <button class="notice-btn" id="addBtn" type="button"><span>+</span> <span>추가</span></button>
